<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listening Hub - Online Songs</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Arial', sans-serif; }
    body { background:#121212; color:white; }

    main { display:flex; height:100vh; overflow:hidden; }

    /* Sidebar */
    .main-menu { width:220px; background:#181818; display:flex; flex-direction:column; justify-content:space-between; padding:20px; }
    .main-menu .user-info { text-align:center; margin-bottom:30px; }
    .main-menu img { width:70px; border-radius:50%; margin-bottom:10px; }
    .main-menu ul { list-style:none; }
    .main-menu li { margin:15px 0; }
    .main-menu a { text-decoration:none; color:white; display:flex; align-items:center; gap:10px; font-size:16px; }
    .main-menu li.active a { color:#1DB954; }

    /* Main content */
    .content { flex:1; display:flex; overflow-y:auto; padding:20px; gap:20px; }
    .left-content { flex:2; }
    .right-content { flex:1; }

    /* Swiper slider */
    .swiper { width:100%; margin-bottom:30px; }
    .swiper-slide { position:relative; border-radius:10px; overflow:hidden; }
    .swiper-slide img { width:100%; display:block; height:200px; object-fit:cover; }
    .slide-overlay { position:absolute; bottom:0; left:0; width:100%; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding:10px; color:white; }
    .slide-overlay button { background:#1DB954; border:none; padding:5px 10px; border-radius:20px; cursor:pointer; color:white; margin-top:5px; }

    /* Artists / Albums */
    .artist-container, .album-container { display:flex; gap:15px; overflow-x:auto; }
    .artist, .album { min-width:120px; flex-shrink:0; text-align:center; cursor:pointer; }
    .artist img, .album img { width:100%; border-radius:10px; object-fit:cover; }
    .albums h2, .artist p { font-size:14px; margin-top:5px; }

    /* Songs */
    .song-container { display:flex; flex-direction:column; gap:15px; }
    .song { display:flex; align-items:center; justify-content:space-between; background:#181818; padding:10px; border-radius:10px; cursor:pointer; }
    .song img { width:50px; height:50px; border-radius:5px; object-fit:cover; }
    .song div { flex:1; margin-left:10px; }
    .song span { font-size:14px; color:#b3b3b3; }

    /* Search */
    .search-box { margin-bottom:20px; display:flex; gap:10px; }
    .search-box input { flex:1; padding:8px 10px; border-radius:5px; border:none; outline:none; }
    .search-box button { background:#1DB954; border:none; color:white; padding:8px 15px; border-radius:5px; cursor:pointer; }

    /* Music Player */
    .music-player { position:fixed; bottom:0; left:0; width:100%; background:#181818; display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-top:1px solid #282828; }
    .music-player img { width:50px; height:50px; border-radius:5px; object-fit:cover; }
    .music-player .song-info { flex:1; margin-left:15px; }
    .music-player h2 { font-size:16px; }
    .music-player p { font-size:12px; color:#b3b3b3; }
    .music-player .controls { display:flex; align-items:center; gap:15px; }
    .music-player input[type=range] { flex:1; margin:0 15px; }

    ::-webkit-scrollbar { width:8px; height:8px; }
    ::-webkit-scrollbar-thumb { background:#1DB954; border-radius:4px; }
    ::-webkit-scrollbar-track { background:#121212; }
  </style>
</head>

<body>

<main>

  <!-- Sidebar -->
  <nav class="main-menu">
    <div>
      <div class="user-info">
        <img src="https://randomuser.me/api/portraits/men/75.jpg" alt="User Profile">
        <p>Thomas Shelby</p>
      </div>
      <ul>
        <li class="nav-item active"><a href="#"><i class="fa fa-map"></i>Discover</a></li>
        <li class="nav-item"><a href="#"><i class="fa fa-arrow-trend-up"></i>Trending</a></li>
        <li class="nav-item"><a href="#"><i class="fa fa-compact-disc"></i>Album</a></li>
        <li class="nav-item"><a href="#"><i class="fa fa-circle-play"></i>Playlist</a></li>
        <li class="nav-item"><a href="#"><i class="fa fa-heart"></i>Favorites</a></li>
      </ul>
    </div>
    <ul>
      <li class="nav-item"><a href="#"><i class="fa fa-user"></i>Account</a></li>
      <li class="nav-item"><a href="#"><i class="fa fa-gear"></i>Settings</a></li>
      <li class="nav-item"><a href="#"><i class="fa fa-right-from-bracket"></i>Logout</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <section class="content">

    <!-- Left -->
    <div class="left-content">
      <h1>Popular Playlist</h1>
      <div class="swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img src="https://picsum.photos/300/200?random=1"><div class="slide-overlay"><h2>Vibe Songs</h2><button onclick="playOnlineSong(0)">Listen <i class="fa fa-play"></i></button></div></div>
          <div class="swiper-slide"><img src="https://picsum.photos/300/200?random=2"><div class="slide-overlay"><h2>Music ON</h2><button onclick="playOnlineSong(1)">Listen <i class="fa fa-play"></i></button></div></div>
          <div class="swiper-slide"><img src="https://picsum.photos/300/200?random=3"><div class="slide-overlay"><h2>Spotify Hits</h2><button onclick="playOnlineSong(2)">Listen <i class="fa fa-play"></i></button></div></div>
        </div>
        <div class="swiper-pagination"></div>
      </div>

      <h1>Featured Artists</h1>
      <div class="artist-container">
        <div class="artist"><img src="https://picsum.photos/100/100?random=4"><p>GV Prakash</p></div>
        <div class="artist"><img src="https://picsum.photos/100/100?random=5"><p>Anirudh</p></div>
        <div class="artist"><img src="https://picsum.photos/100/100?random=6"><p>Jimin</p></div>
        <div class="artist"><img src="https://picsum.photos/100/100?random=7"><p>Billie Eilish</p></div>
      </div>
    </div>

    <!-- Right -->
    <div class="right-content">
      <h1>Search Songs</h1>
      <div class="search-box">
        <input type="text" id="search" placeholder="Search song or artist...">
        <button onclick="searchSong()">Search</button>
      </div>

      <h1>Recommended Songs</h1>
      <div class="song-container" id="song-list">
        <!-- Songs dynamically generated -->
      </div>
    </div>

  </section>

</main>

<!-- Bottom Music Player -->
<div class="music-player">
  <img id="player-cover" src="https://picsum.photos/50/50?random=1" alt="Album Cover">
  <div class="song-info">
    <h2 id="player-title">Song 1</h2>
    <p id="player-artist">Artist 1</p>
  </div>
  <input type="range" id="progress" value="0">
  <div class="controls">
    <button onclick="prevSong()"><i class="fa fa-backward"></i></button>
    <button onclick="playPause()"><i class="fa fa-play" id="icon"></i></button>
    <button onclick="nextSong()"><i class="fa fa-forward"></i></button>
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
  </div>

  <!-- Audio -->
  <audio id="song">
    <source src="" type="audio/mpeg">
  </audio>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  // Swiper init
  new Swiper('.swiper', { loop:true, pagination:{ el:'.swiper-pagination', clickable:true } });

  const onlineSongs = [
    { title: "Song 1", artist: "Artist 1", cover: "https://picsum.photos/50/50?random=1", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { title: "Song 2", artist: "Artist 2", cover: "https://picsum.photos/50/50?random=2", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { title: "Song 3", artist: "Artist 3", cover: "https://picsum.photos/50/50?random=3", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    { title: "Song 4", artist: "GV Prakash", cover: "https://picsum.photos/50/50?random=4", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
    { title: "Song 5", artist: "Anirudh", cover: "https://picsum.photos/50/50?random=5", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" },
  ];

  const song = document.getElementById("song");
  const icon = document.getElementById("icon");
  const progress = document.getElementById("progress");
  const volume = document.getElementById("volume");
  const playerTitle = document.getElementById("player-title");
  const playerArtist = document.getElementById("player-artist");
  const playerCover = document.getElementById("player-cover");
  const songList = document.getElementById("song-list");

  let currentIndex = 0;

  function renderSongList(songs){
    songList.innerHTML = '';
    songs.forEach((s, i)=>{
      const div = document.createElement('div');
      div.className = 'song';
      div.innerHTML = `<img src="${s.cover}"><div><h2>${s.title}</h2><p>${s.artist}</p></div><span>3:45</span>`;
      div.onclick = ()=>{ currentIndex=i; playOnlineSong(i); };
      songList.appendChild(div);
    });
  }

  function playOnlineSong(index){
    const s = onlineSongs[index];
    song.src = s.url;
    playerTitle.textContent = s.title;
    playerArtist.textContent = s.artist;
    playerCover.src = s.cover;
    song.play();
    icon.classList.replace("fa-play","fa-pause");
  }

  function playPause(){
    if(song.paused){
      song.play().then(()=> icon.classList.replace("fa-play","fa-pause"));
    }else{
      song.pause();
      icon.classList.replace("fa-pause","fa-play");
    }
  }

  function nextSong(){
    currentIndex = (currentIndex+1) % onlineSongs.length;
    playOnlineSong(currentIndex);
  }

  function prevSong(){
    currentIndex = (currentIndex-1 + onlineSongs.length) % onlineSongs.length;
    playOnlineSong(currentIndex);
  }

  function searchSong(){
    const query = document.getElementById('search').value.toLowerCase();
    const filtered = onlineSongs.filter(s => s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query));
    renderSongList(filtered);
  }

  song.onloadedmetadata = ()=>progress.max = song.duration;
  song.ontimeupdate = ()=>progress.value = song.currentTime;
  progress.oninput = ()=>song.currentTime = progress.value;
  volume.oninput = ()=>song.volume = volume.value;

  // Initial render
  renderSongList(onlineSongs);
  playOnlineSong(0);
</script>

</body>
</html>
